services:
  db:
    image: postgres:16
    container_name: eu-bank-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eu-bank-backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CARD_NETWORK_BASE_URL: ${CARD_NETWORK_BASE_URL:-http://host.docker.internal:8072}
      CARD_NETWORK_API_KEY: ${CARD_NETWORK_API_KEY:-bank-key-eu-a}
      CARD_NETWORK_HMAC_SECRET: ${CARD_NETWORK_HMAC_SECRET:-secret-eu-a-hmac}
      TARGET_URL: http://target_service:8001
      SEPA_BATCH_URL: http://sepa_batch_service:8002
      SEPA_INSTANT_URL: http://sepa_instant_service:8003
      BANK_BIC: ${BANK_BIC:-BANKDEXX}
      BANK_NAME: ${BANK_NAME:-Deutsche Bank}
      INITIAL_LIQUIDITY: ${INITIAL_LIQUIDITY:-1000000.00}
      WEBHOOK_URL: http://eu-bank-backend:8080/api/v1/target-settlement
      SWIFT_URL: ${SWIFT_URL:-http://host.docker.internal:3000}
      SWIFT_CLIENT_ID: ${SWIFT_CLIENT_ID:-test-client}
      SWIFT_CLIENT_SECRET: ${SWIFT_CLIENT_SECRET:-test-secret}
      SWIFT_BANK_BIC: ${SWIFT_BANK_BIC:-BANKDEXX}
      SWIFT_ENABLED: ${SWIFT_ENABLED:-true}
      SWIFT_FEE_PERCENT: ${SWIFT_FEE_PERCENT:-0.01}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - eu-payments-units_payment_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eu-bank-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

networks:
  eu-payments-units_payment_network:
    external: true

volumes:
  postgres_data:
