services:
  db:
    image: postgres:16
    container_name: eu-bank-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eu-bank-backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CARD_NETWORK_BASE_URL: ${CARD_NETWORK_BASE_URL:-http://host.docker.internal:8072}
      CARD_NETWORK_API_KEY: ${CARD_NETWORK_API_KEY:-bank-key-eu-a}
      CARD_NETWORK_HMAC_SECRET: ${CARD_NETWORK_HMAC_SECRET:-secret-eu-a-hmac}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eu-bank-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
